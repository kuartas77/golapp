name: Repository to cPanel

on:
  push:
    branches: [template]

  # Permite ejecutar manualmente un despliegue completo desde GitHub Actions.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Evita dos despliegues FTP simultáneos hacia el mismo cPanel.
concurrency:
  group: cpanel-template-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Detect and deploy changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend and frontend changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          backend=false
          frontend=false

          # Para ejecución manual o primer push de una rama:
          # despliega todo para evitar omitir archivos.
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$BEFORE_SHA" =~ ^0{40}$ ]]; then
            backend=true
            frontend=true
            echo "Deploy completo: ejecución manual o primer push."
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"

            echo "Archivos modificados:"
            echo "$changed_files"

            while IFS= read -r file; do
              # Backend Laravel / PHP
              case "$file" in
                app/*|bootstrap/*|config/*|database/*|routes/*|lang/*|\
                resources/views/*|resources/lang/*|public/*|\
                artisan|composer.json|composer.lock|phpunit.xml)
                  backend=true
                  ;;
              esac

              # Frontend compilado por Vite
              case "$file" in
                resources/js/*|resources/css/*|resources/sass/*|resources/scss/*|\
                resources/images/*|resources/fonts/*|\
                package.json|pnpm-lock.yaml|pnpm-workspace.yaml|\
                vite.config.*|tailwind.config.*|postcss.config.*)
                  frontend=true
                  ;;
              esac
            done <<< "$changed_files"
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

          echo "¿Desplegar backend?: $backend"
          echo "¿Compilar/desplegar frontend?: $frontend"

      - name: Setup pnpm
        if: steps.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 24
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build frontend with Vite
        if: steps.changes.outputs.frontend == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy Laravel / PHP project
        if: steps.changes.outputs.backend == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_TEST_SERVER }}
          username: ${{ secrets.FTP_TEST_USERNAME }}
          password: ${{ secrets.FTP_TEST_PASSWORD }}
          local-dir: ./
          server-dir: /
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            .github/**
            tests/**
            .env
            .env.*
            storage/**
            public/storage/**
            public/uploads/**
            public/build/**
            public/build
            **/.ftp-deploy-*.json

      - name: Deploy compiled frontend build
        if: steps.changes.outputs.frontend == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_TEST_SERVER }}
          username: ${{ secrets.FTP_TEST_USERNAME }}
          password: ${{ secrets.FTP_TEST_PASSWORD }}
          local-dir: ./public/build/
          server-dir: /public/build/
          state-name: .ftp-deploy-sync-state.json